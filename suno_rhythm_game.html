<html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suno Beat Striker</title>
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (アイコン用) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            touch-action: manipulation;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* 3D風のレーン傾斜エフェクト */
        .stage-container {
            perspective: 1200px;
        }

        .play-area {
            transform: rotateX(20deg);
            transform-origin: bottom center;
        }

        /* レーンの発光 */
        .lane {
            position: relative;
            background: linear-gradient(180deg, rgba(30, 27, 75, 0.2) 0%, rgba(30, 27, 75, 0.8) 100%);
            border-left: 1px solid rgba(99, 102, 241, 0.2);
            border-right: 1px solid rgba(99, 102, 241, 0.2);
            overflow: hidden;
            transition: background 0.08s ease;
        }

        .lane.active-0 { background: linear-gradient(180deg, rgba(236, 72, 153, 0.15) 0%, rgba(236, 72, 153, 0.5) 100%); }
        .lane.active-1 { background: linear-gradient(180deg, rgba(168, 85, 247, 0.15) 0%, rgba(168, 85, 247, 0.5) 100%); }
        .lane.active-2 { background: linear-gradient(180deg, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0.5) 100%); }
        .lane.active-3 { background: linear-gradient(180deg, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0.5) 100%); }

        /* ノーツデザイン */
        .note {
            position: absolute;
            left: 5%;
            width: 90%;
            height: 24px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transform: translateY(-50%);
        }

        .note-0 { background: linear-gradient(90deg, #ec4899, #f472b6); box-shadow: 0 0 15px rgba(236, 72, 153, 0.6); }
        .note-1 { background: linear-gradient(90deg, #a855f7, #c084fc); box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }
        .note-2 { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .note-3 { background: linear-gradient(90deg, #22c55e, #4ade80); box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }

        /* 判定ライン */
        .judge-line {
            box-shadow: 0 -4px 10px rgba(99, 102, 241, 0.4), 0 4px 10px rgba(99, 102, 241, 0.4);
        }

        /* 判定テキストアニメーション */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.25); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .judge-pop {
            animation: pop 0.12s ease-out forwards;
        }

        /* コンボ波紋エフェクト */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px rgba(99, 102, 241, 0.9); }
            100% { transform: scale(1); }
        }

        .combo-pulse {
            animation: pulse 0.08s ease-out;
        }
    </style>

    <audio id="game-audio" src="https://cdn1.suno.ai/9aee65d4-e19e-4424-94f2-e44230d75583.mp3" preload="auto"></audio>

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="music" aria-hidden="true" class="lucide lucide-music"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg> BEAT STRIKER

            <p class="text-xs text-slate-400">Song: Suno Electro Anthem</p>
        </div>
        <div class="flex items-center gap-4">

            <div class="text-right">
                <div class="text-xs text-slate-400">SCORE</div>

        let notesToSpawn = [];

        // テンポよく秒表示にパディングする関数
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // 難易度の切り替え関数
        function setDifficulty(diff) {
            currentDifficulty = diff;
            
            // ボタンのスタイル更新
            btnEasy.className = "py-2.5 rounded-xl font-black text-xs border-2 active:scale-95 transition-all " + 
                (diff === 'easy' ? "border-emerald-500 text-white bg-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.3)]" : "border-emerald-500/30 text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20");
                
            btnNormal.className = "py-2.5 rounded-xl font-black text-xs border-2 active:scale-95 transition-all " + 
                (diff === 'normal' ? "border-indigo-500 text-white bg-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.3)]" : "border-indigo-500/30 text-indigo-400 bg-indigo-500/10 hover:bg-indigo-500/20");
                
            btnHard.className = "py-2.5 rounded-xl font-black text-xs border-2 active:scale-95 transition-all " + 
                (diff === 'hard' ? "border-pink-500 text-white bg-pink-500/30 shadow-[0_0_15px_rgba(236,72,153,0.3)]" : "border-pink-500/30 text-pink-400 bg-pink-500/10 hover:bg-pink-500/20");

            // 速度倍率の設定 (HARDを従来よりさらに高速化: 0.70 -> 0.95)
            if (diff === 'easy') {
                speedMultiplier = 0.40;
            } else if (diff === 'normal') {
                speedMultiplier = 0.55;
            } else if (diff === 'hard') {
                speedMultiplier = 0.95;
            }
        }

        // 難易度ボタンのクリックリスナー登録
        btnEasy.addEventListener('click', () => setDifficulty('easy'));
        btnNormal.addEventListener('click', () => setDifficulty('normal'));
        btnHard.addEventListener('click', () => setDifficulty('hard'));

        // ゲーム初期化
        function initGame() {
            score = 0;
            combo = 0;
            activeNotes = [];
            stats = { perfect: 0, great: 0, good: 0, miss: 0 };
            
            scoreEl.innerText = "0000000";
            comboCountEl.innerText = "0";
            comboDisplay.style.opacity = "0";
            judgeDisplay.innerText = "";
            notesContainer.innerHTML = "";
            
            // 譜面データを難易度に応じてコピー
            let targetBeatmap = normalBeatmap;
            if (currentDifficulty === 'easy') {
                targetBeatmap = easyBeatmap;
            } else if (currentDifficulty === 'hard') {
                targetBeatmap = hardBeatmap;
            }

            // 譜面データを300秒(5分間)まで自動的に拡張してループ生成
            // これにより、Sunoの曲がどれだけ長くても途中でノーツが途絶えなくなります。
            let extendedBeatmap = targetBeatmap.map(note => ({ ...note, spawned: false }));
            
            if (targetBeatmap.length > 0) {
                const lastNoteTime = targetBeatmap[targetBeatmap.length - 1].time;
                
                // 最も盛り上がるサビ部分（56.20秒〜95.60秒）をループ元にする
                const loopStart = 56.20;
                const loopEnd = 95.60;
                const loopDuration = loopEnd - loopStart;
                
                const chorusNotes = targetBeatmap.filter(n => n.time >= loopStart && n.time <= loopEnd);
                
                let currentOffset = lastNoteTime - loopStart + 1.6; // ループを挟む間隔オフセット
                
                // 曲の想定最長演奏時間（5分）まで拡張
                while (currentOffset < 300) {
                    chorusNotes.forEach(note => {
                        const newTime = note.time - loopStart + currentOffset;
                        if (newTime < 300) {
                            extendedBeatmap.push({
                                time: parseFloat(newTime.toFixed(2)),
                                lane: note.lane,
                                spawned: false
                            });
                        }
                    });
                    currentOffset += loopDuration;
                }
            }

            // 時間順にソートして最終譜面として格納
            extendedBeatmap.sort((a, b) => a.time - b.time);
            notesToSpawn = extendedBeatmap;
        }

        // ゲーム開始
        function startGame() {
            initGame();
            overlay.classList.add('hidden');
            isPlaying = true;
            
            audio.currentTime = 0;
            audio.play().then(() => {
                animationFrameId = requestAnimationFrame(gameLoop);
            }).catch(err => {
                console.error("Audio Playback Error:", err);
                alert("音声の再生に失敗しました。画面を一度クリックして再度スタートしてください。");
                stopGame();
            });
        }

        // ゲーム一時停止
        function pauseGame() {
            if (!isPlaying) return;
            isPlaying = false;
            audio.pause();
            cancelAnimationFrame(animationFrameId);
            
            // 一時停止画面の表示
            overlay.classList.remove('hidden');
            startView.classList.add('hidden');
            pauseView.classList.remove('hidden');
            resultView.classList.add('hidden');
        }

        // ゲーム再開
        function resumeGame() {
            overlay.classList.add('hidden');
            isPlaying = true;
            audio.play();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ゲーム終了（完全停止）
        function stopGame() {
            isPlaying = false;
            audio.pause();
            cancelAnimationFrame(animationFrameId);
            
            // 初期状態に戻す
            overlay.classList.remove('hidden');
            startView.classList.remove('hidden');
            pauseView.classList.add('hidden');
            resultView.classList.add('hidden');
        }

        // メインゲームループ (60fps)
        function gameLoop() {
            if (!isPlaying) return;

            const currentTime = audio.currentTime;
            
            // プログレスバーの更新
            progressBar.style.width = `${(currentTime / audio.duration) * 100}%`;
            currentTimeEl.innerText = formatTime(currentTime);
            totalTimeEl.innerText = formatTime(audio.duration || 108);

            // 1. ノーツの生成判定
            notesToSpawn.forEach(note => {
                // ノーツのタイミングの2秒前に生成（画面最上部に現れるタイミング）
                if (!note.spawned && currentTime >= note.time - 2.0) {
                    createNoteElement(note);
                    note.spawned = true;
                }
            });

            // 2. 既存ノーツの移動・更新
            for (let i = activeNotes.length - 1; i >= 0; i--) {
                const note = activeNotes[i];
                // ターゲット時間に達するまでの差分
                const timeDiff = note.time - currentTime;
                
                // ノーツの位置計算 (ターゲットラインの位置 = judgeLineYPercent)
                const yPercent = judgeLineYPercent - (timeDiff * speedMultiplier * 100);
                
                note.element.style.top = `${yPercent}%`;

                // 判定ラインを大幅に過ぎ去った場合のMISS判定
                if (timeDiff < -goodWindow) {
                    note.element.remove();
                    activeNotes.splice(i, 1);
                    triggerMiss();
                }
            }

            // 3. 曲が終了したかチェック
            if (audio.ended || (currentTime >= audio.duration && audio.duration > 0)) {
                showResults();
                return;
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ノーツ要素の動的DOM生成
        function createNoteElement(note) {
            const noteEl = document.createElement('div');
            noteEl.classList.add('note', `note-${note.lane}`);
            
            // 4つのレーンへのX座標決定
            noteEl.style.left = `${note.lane * laneWidthPercent + 2.5}%`;
            noteEl.style.width = `${laneWidthPercent - 5}%`;
            noteEl.style.top = `-50px`; // 画面最上部の裏側からスタート
            
            notesContainer.appendChild(noteEl);
            
            activeNotes.push({
                ...note,
                element: noteEl
            });
        }

        // 判定処理
        function processInput(lane) {
            if (!isPlaying) return;

            const currentTime = audio.currentTime;
            let hit = false;

            // 最も判定ラインに近いノーツを探す
            for (let i = 0; i < activeNotes.length; i++) {
                const note = activeNotes[i];
                if (note.lane === lane) {
                    const timeDiff = Math.abs(note.time - currentTime);

                    // 許容判定ウインドウ内にあるか
                    if (timeDiff <= goodWindow) {
                        note.element.remove();
                        activeNotes.splice(i, 1);
                        
                        let rating = "GOOD";
                        let points = 50;
                        let color = "text-cyan-400";

                        if (timeDiff <= perfectWindow) {
                            rating = "PERFECT";
                            points = 150;
                            color = "text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]";
                            stats.perfect++;
                        } else if (timeDiff <= greatWindow) {
                            rating = "GREAT";
                            points = 100;
                            color = "text-emerald-400";
                            stats.great++;
                        } else {
                            stats.good++;
                        }

                        // スコアとコンボの反映
                        combo++;
                        score += points + (combo * 2); // コンボボーナス
                        
                        updateHUD();
                        showJudgeEffect(rating, color);
                        
                        hit = true;
                        break;
                    }
                }
            }
        }

        // ミスしたときの処理
        function triggerMiss() {
            combo = 0;
            stats.miss++;
            updateHUD();
            showJudgeEffect("MISS", "text-rose-500");
        }

        // スコアとコンボの描画更新
        function updateHUD() {
            scoreEl.innerText = String(score).padStart(7, '0');
            
            if (combo > 0) {
                comboCountEl.innerText = combo;
                comboDisplay.style.opacity = "1";
                comboCountEl.classList.remove('combo-pulse');
                void comboCountEl.offsetWidth; // リフローを起こしてアニメーションを再トリガー
                comboCountEl.classList.add('combo-pulse');
            } else {
                comboDisplay.style.opacity = "0";
            }
        }

        // 判定テキストのポップアップ表示
        function showJudgeEffect(text, colorClass) {
            judgeDisplay.className = `text-3xl font-black tracking-widest font-orbitron h-10 judge-pop ${colorClass}`;
            judgeDisplay.innerText = text;
            
            void judgeDisplay.offsetWidth;
        }

        // タップ/キー操作時のUIおよび入力処理
        function triggerTap(lane) {
            processInput(lane);

            // ビジュアルエフェクト：レーンの発光
            const laneEl = document.getElementById(`lane-${lane}`);
            const guideEl = document.getElementById(`key-guide-${lane}`);
            
            laneEl.classList.add(`active-${lane}`);
            guideEl.classList.add('scale-90', 'brightness-125');

            setTimeout(() => {
                laneEl.classList.remove(`active-${lane}`);
                guideEl.classList.remove('scale-90', 'brightness-125');
            }, 100);
        }

        // キーボードマッピング (D, F, J, K)
        const keyMap = {
            'd': 0, 'D': 0, 'shipt': 0, 'し': 0,
            'f': 1, 'F': 1, 'は': 1,
            'j': 2, 'J': 2, 'ま': 2,
            'k': 3, 'K': 3, 'の': 3
        };

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return; // 長押し防止
            if (keyMap[e.key] !== undefined) {
                triggerTap(keyMap[e.key]);
            }
        });

        // リザルト画面の生成と表示
        function showResults() {
            isPlaying = false;
            audio.pause();
            cancelAnimationFrame(animationFrameId);

            // 現在有効になっているノーツ数を元に計算
            const activeSessionNotes = notesToSpawn.filter(n => n.time <= audio.currentTime).length;
            
            let rank = "C";
            const maxPossibleScore = activeSessionNotes * 150 + (activeSessionNotes * (activeSessionNotes + 1));
            const scoreRatio = score / (maxPossibleScore || 1);

            if (stats.miss === 0 && stats.perfect > activeSessionNotes * 0.9) rank = "SSS";
            else if (scoreRatio > 0.85) rank = "SS";
            else if (scoreRatio > 0.70) rank = "S";
            else if (scoreRatio > 0.55) rank = "A";
            else if (scoreRatio > 0.40) rank = "B";

            const diffBadge = document.getElementById('result-difficulty-badge');
            diffBadge.innerText = currentDifficulty;
            if (currentDifficulty === 'easy') {
                diffBadge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 shadow-[0_0_10px_rgba(16,185,129,0.2)]";
            } else if (currentDifficulty === 'normal') {
                diffBadge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-1 bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_10px_rgba(99,102,241,0.2)]";
            } else if (currentDifficulty === 'hard') {
                diffBadge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-1 bg-pink-500/20 text-pink-400 border border-pink-500/30 shadow-[0_0_10px_rgba(236,72,153,0.2)]";
            }

            document.getElementById('result-score').innerText = String(score).padStart(7, '0');
            document.getElementById('result-rank').innerText = rank;
            document.getElementById('stat-perfect').innerText = stats.perfect;
            document.getElementById('stat-great').innerText = stats.great;
            document.getElementById('stat-good').innerText = stats.good;
            document.getElementById('stat-miss').innerText = stats.miss;

            overlay.classList.remove('hidden');
            startView.classList.add('hidden');
            pauseView.classList.add('hidden');
            resultView.classList.remove('hidden');
        }

        // イベントリスナーの紐付け
        btnStart.addEventListener('click', startGame);
        btnPause.addEventListener('click', pauseGame);
        btnResume.addEventListener('click', resumeGame);
        btnRestart.addEventListener('click', () => {
            initGame();
            startGame();
        });
        btnBackToStart.addEventListener('click', () => {
            initGame();
            overlay.classList.remove('hidden');
            startView.classList.remove('hidden');
            pauseView.classList.add('hidden');
            resultView.classList.add('hidden');
        });

        // 音声読み込み完了時にトータル時間を表示しておく
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.innerText = formatTime(audio.duration);
        });

        // 難易度の初期状態設定
        setDifficulty('normal');
    </script>

</body></html>
